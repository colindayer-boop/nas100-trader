# ────────────────────────────────────────────────────────────────────────────
# TEMPLATE — copy this file to  config.ini  and fill in your own credentials.
#   cp config.example.ini config.ini
# config.ini is gitignored and stays ONLY on your machine. Never commit it,
# never paste its contents into a chat. The broker adapters read from it locally.
# ────────────────────────────────────────────────────────────────────────────

[alpaca]
# Paper trading keys from https://app.alpaca.markets (Paper account)
key        = YOUR_ALPACA_PAPER_KEY
secret     = YOUR_ALPACA_PAPER_SECRET
base_url   = https://paper-api.alpaca.markets
risk_scale = 1.0

[ctrader]
# FTMO via cTrader Open API. Get these from cTrader:
#   Settings -> "FIX API / Open API"  (or https://openapi.ctrader.com to register an app)
# You need an application (client id + secret) AND an access token for your account.
account_id    = 17143495          # your cTrader account number (not secret)
client_id     = YOUR_CTRADER_CLIENT_ID
client_secret = YOUR_CTRADER_CLIENT_SECRET
access_token  = YOUR_CTRADER_ACCESS_TOKEN
host          = demo              # 'demo' for the FTMO free trial, 'live' later
risk_scale    = 1.5              # FTMO 10% DD room → 1.5x sweet spot (DD-throttle caps it at target)

[mt5]
# FTMO / prop via MetaTrader 5 (WINDOWS only — run on the VPS).
# Use an instant MT5 DEMO account first (no KYC) to verify sizing + execution.
# Find login/server in the MT5 terminal: File -> Open an Account (demo).
login     = YOUR_MT5_LOGIN          # account number (integer)
password  = YOUR_MT5_PASSWORD
server    = MetaQuotes-Demo         # or FTMO-Demo / your broker's server name
# Optional symbol overrides if your broker names differ (run `python mt5_broker.py`):
# map_qqq = US100
# map_spy = US500
# map_gld = XAUUSD
risk_scale = 1.5                     # FTMO 10% DD room → ~1.5x; DD-throttle caps it

[tradovate]
# Optional futures path (Apex/Topstep via Tradovate). Fill later if you go futures.
name        = YOUR_TRADOVATE_USERNAME
password    = YOUR_TRADOVATE_PASSWORD
app_id      = YOUR_TRADOVATE_APP_ID
app_secret  = YOUR_TRADOVATE_APP_SECRET
base_url    = https://demo.tradovateapi.com/v1
risk_scale  = 0.5               # tight trailing DD -> half size

[risk]
target_drawdown      = 0.08   # DD-throttle target (validated sweet spot: +13.2% CAGR, -6.7% DD)
daily_loss_limit     = 0.05   # halt new orders if session loss exceeds this
monthly_loss_limit   = 0.04   # halt new orders if month-to-date loss exceeds this (worst-month guard)
session_start_equity = 0      # set at session start; 0 = disable daily kill-switch

# --- PROP CHALLENGE sizing (FundedNext Stellar / FTMO: +8% target, 10% DD, 5% daily) ---
# vol_target is the annualized vol the book is sized to. MC sweet spot (best pass-odds
# net of blow-up) is ~0.16. Higher = faster pass but more blow-ups; lower = safe but slow.
#   0.08 -> ~13% pass in 3mo,  0% blow-up  (patient / capital-preservation)
#   0.16 -> ~50% pass in 3mo, ~13% blow-up (BALANCED — recommended)
#   0.25 -> ~62% pass in 3mo, ~31% blow-up (aggressive, not recommended)
prop_mode            = 1      # 1 = size to vol_target below instead of raw risk_scale
prop_vol_target      = 0.16   # annualized vol for the challenge (balanced sweet spot)
prop_profit_target   = 0.08   # phase-1 target (informational; used by prop_status logging)

[alerts]
# Leave blank to use console-only mode (default). Fill in at least ONE channel.
# Telegram: create a bot via @BotFather, then /getid your chat
telegram_token = YOUR_TELEGRAM_BOT_TOKEN
chat_id        = YOUR_TELEGRAM_CHAT_ID
# Email (SMTP): Gmail example shown; use an App Password if 2FA is on
smtp_host      = smtp.gmail.com
smtp_port      = 587
smtp_user      = YOUR_EMAIL@gmail.com
smtp_pass      = YOUR_APP_PASSWORD
to_email       = YOUR_EMAIL@gmail.com

[binance]
# Spot API keys from binance.com (enable Spot trading; restrict to your IP).
# Public market data (get_bars) works without these; trading needs them.
key        = YOUR_BINANCE_KEY
secret     = YOUR_BINANCE_SECRET
base_url   = https://api.binance.com
risk_scale = 1.0

[llm_bridge]
# Optional AUTO mode for the GLM/Qwen bridge (scripts/router/llm_bridge.py).
# If set, `task_router.py brief TASK-...` pipes the brief straight to your CLI
# and ingests the reply automatically. {brief} = path to the brief file.
# glm_cmd  = openclaw run --model glm-4.6 --prompt-file {brief}
# qwen_cmd = qwen chat --file {brief}
